<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시설물 점검 모니터링 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" 
      media="print" onload="this.media='all'">
    <script>
      // ─────────────────────────────────────────────────────────
      // [구조 변경] Firebase SDK 및 클라이언트 직접 접속 로직을 제거했습니다.
      // 모든 Firestore 읽기는 Cloud Run API 서버(/api/*)가 전담합니다.
      // 같은 출처(同源)로 배포 시 API_BASE는 빈 문자열로 두면 됩니다.
      // 다른 도메인에서 호스팅한다면 아래 값을 Cloud Run 서비스 URL로 바꾸세요.
      // 예: const API_BASE = "https://facility-dashboard-xxxxx-an.a.run.app";
      // ─────────────────────────────────────────────────────────
      const API_BASE = "";
    </script>  
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

        :root {
            --bg-dark: #0B0F14;
            --panel-2: #161D26;
            --stripe: #141B23;
            --card-bg: #11161D;
            --text-main: #E7ECF1;
            --sub: #8996A5;
            --sub-dim: #5B6672;
            --border-color: #232C36;
            --accent-blue: #5EA1FF;
            --accent-teal: #2DD4BF;
            --danger: #EF4B5F;
            --warn: #F5A623;
            --divider: #3A4451;
            --btn-secondary-bg: #2A323C;
            --btn-secondary-text: #E7ECF1;
            --hidden-btn-idle: #3A4451;
            --overlay-bg: rgba(11, 15, 20, 0.8);
            --modal-overlay-bg: rgba(5, 8, 11, 0.7);
            --shadow-login: 0 10px 30px rgba(0,0,0,0.5);
            --shadow-modal: 0 20px 60px rgba(0,0,0,0.5);
            --chart-grid: #1B222B;
            --chart-tick: #8996A5;
            --chart-label: #E7ECF1;
            --chart-label-strong: #E7ECF1;
            --chart-datalabel-onpie: #0B0F14;
            color-scheme: dark;
        }

        /* 💡 [신규] 라이트 테마 토글 — html.light-theme 클래스가 붙으면 원래(밝은) 톤으로 전환 */
        html.light-theme {
            --bg-dark: #f4f6f9;
            --panel-2: #edf2f7;
            --stripe: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --sub: #475569;
            --sub-dim: #94a3b8;
            --border-color: #e2e8f0;
            --accent-blue: #3b82f6;
            --divider: #cbd5e1;
            --btn-secondary-bg: #4b5563;
            --btn-secondary-text: #ffffff;
            --hidden-btn-idle: #cbd5e1;
            --overlay-bg: rgba(255, 255, 255, 0.5);
            --modal-overlay-bg: rgba(15, 23, 42, 0.55);
            --shadow-login: 0 10px 25px -5px rgba(0,0,0,0.1);
            --shadow-modal: 0 20px 60px rgba(0,0,0,0.25);
            --chart-grid: #f1f5f9;
            --chart-tick: #64748b;
            --chart-label: #475569;
            --chart-label-strong: #1e293b;
            --chart-datalabel-onpie: #ffffff;
            color-scheme: light;
        }
        html.light-theme .refresh-btn { color: white; }
        html.light-theme .theme-toggle-btn i.fa-sun { display: inline; }
        html.light-theme .theme-toggle-btn i.fa-moon { display: none; }
        .theme-toggle-btn i.fa-sun { display: none; }
        .theme-toggle-btn i.fa-moon { display: inline; }

        /* [일반 창 모드 기본값] */
        html, body {
            margin: 0; box-sizing: border-box; height: auto !important; overflow: auto !important;
        }
        body {
            padding: 20px;
            font-family: 'IBM Plex Sans', 'Malgun Gothic', dotum, sans-serif;
            background: var(--bg-dark); color: var(--text-main);
            display: flex; flex-direction: column;
        }

        #dashboard-content {
            display: flex; flex-direction: column; width: 100%;
        }

        .header-bar {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid var(--border-color); flex-shrink: 0;
        }
        .header-left { display: flex; align-items: center; gap: 15px; }

        /* 헤더 우측 버튼 그룹 정의 */
        .header-right { 
            display: flex; align-items: center; gap: 10px; white-space: nowrap; 
        }

        .company-logo-badge {
            display: inline-flex; align-items: center; justify-content: center;
            background: #ffffff; border-radius: 8px; padding: 6px 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .company-logo {
            height: 40px; width: auto; object-fit: contain; transform-origin: center center;
            animation: waveFlag 3s ease-in-out infinite alternate;
        }

        @keyframes waveFlag {
            0% { transform: translate(0, 0) rotateX(0deg) rotateY(-5deg) skewY(-1deg); }
            5% { transform: translate(1px, -1px) rotateX(2deg) rotateY(5deg) skewY(1deg); }
            100% { transform: translate(-1px, 2px) rotateX(-2deg) rotateY(10deg) skewY(1deg); }
        }

        .fullscreen-loader {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--overlay-bg); backdrop-filter: blur(1px); -webkit-backdrop-filter: blur(1px);
            display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .loader-box { text-align: center; }
        .spinner-circle {
            width: 50px; height: 50px; border: 5px solid var(--border-color); border-top: 5px solid var(--accent-blue); border-radius: 50%;
            animation: loader-spin 1s linear infinite; margin: 0 auto 15px;
        }
        .loader-text { font-size: 16px; font-weight: bold; color: var(--text-main); margin: 0; }

        @keyframes loader-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .header-bar h2 { margin: 0; font-size: 24px; color: var(--text-main); font-weight: 600; }

        /* 기본 상단 버튼 스타일 */
        .refresh-btn {
            background: var(--accent-blue); color: #0B0F14; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s;
        }
        .refresh-btn:hover { background: #7FB6FF; }

        .theme-toggle-btn {
            background: var(--btn-secondary-bg); color: var(--btn-secondary-text);
            border: none; border-radius: 6px; cursor: pointer;
            width: 20px; height: 20px; padding: 0;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 10px; transition: 0.2s; flex-shrink: 0;
        }
        .theme-toggle-btn:hover { filter: brightness(1.3); }

        /* 💡 [트릭 구현] 변신형 비밀 로그아웃 버튼 애니메이션 효과 */
        .hidden-logout-btn {
            background: var(--hidden-btn-idle); /* 평소에는 은은한 회색 세로선처럼 보이도록 설정 */
            color: transparent;  /* 글자 숨김 */
            border: none;
            width: 4px;          /* 평소에는 'I' 모양처럼 얇게 */
            height: 32px;        /* 세로선 두께감 구현 */
            padding: 0 !important;
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1); /* 부드럽고 찰진 변신 모션 */
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;

            /* 💡 버튼 자체를 오른쪽 끝으로 강제 배달 시킵니다 */
            margin-left: auto; 
        }

        /* 로그아웃 안쪽 아이콘/텍스트 감싸는 레이어 */
        .hidden-logout-btn span, 
        .hidden-logout-btn i {
            opacity: 0;
            transition: opacity 0.2s ease;
            white-space: nowrap;
        }

        /* 💡 [수정] 중요! `.filter-bar:hover` 조건을 삭제했습니다.
           이제 오직 버튼 자기 자신(`.hidden-logout-btn:hover`) 위에 마우스가 올라갔을 때만 펴집니다! */
        .hidden-logout-btn:hover {
            background: var(--danger); /* 마우스 오면 강렬한 레드로 변경 */
            color: white;
            width: 105px;        /* 원래 버튼 너비로 쫙 펼쳐짐 */
            height: 32px;        /* 일반 버튼 크기로 팽창 */
            padding: 0 15px !important;
            border-radius: 6px;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* 💡 [수정] 내부 글씨 서서히 등장 조건도 버튼 자체 호버(`:hover`)로 통일 */
        .hidden-logout-btn:hover span,
        .hidden-logout-btn:hover i {
            opacity: 1;
            transition: opacity 0.2s ease;
            transition-delay: 0.15s; /* 노출 타이밍 조율 */
        }

        .filter-bar {
            background: var(--card-bg); padding: 12px 15px; border-radius: 12px; margin-bottom: 15px; display: flex; gap: 15px; align-items: center; flex-wrap: wrap; border: 1px solid var(--border-color); flex-shrink: 0;
        }
        .filter-group { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: bold; color: var(--sub); }
        .filter-input {
            padding: 6px 10px; border: 1px solid var(--border-color); border-radius: 6px; font-family: inherit;
            background: var(--panel-2); color: var(--text-main);
        }

        /* [일반 창 모드] 고정 격자 구조 */
        .dashboard-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
            margin-bottom: 10px;
        }
        .chart-card { 
            background: var(--card-bg); border-radius: 12px; padding: 20px; 
            border: 1px solid var(--border-color); 
            box-sizing: border-box; display: flex; flex-direction: column; min-height: 0;
            height: 360px !important;
            overflow: hidden;
        }

        /* [전체화면 모드 전용 스타일] */
        :-webkit-full-screen body { height: 100vh !important; padding: 12px !important; overflow: hidden !important; }
        :-ms-fullscreen body { height: 100vh !important; padding: 12px !important; overflow: hidden !important; }
        :fullscreen body {
            height: 100vh !important; padding: 12px !important; overflow: hidden !important;
        }
        :fullscreen #dashboard-content {
            height: 100% !important;
        }
        :fullscreen .header-bar {
            margin-bottom: 8px !important; padding-bottom: 6px !important;
        }
        :fullscreen .filter-bar {
            margin-bottom: 10px !important; padding: 8px 12px !important;
        }
        :fullscreen .dashboard-grid {
            flex: 1 !important;
            min-height: 0 !important;
            grid-template-rows: 1fr 1fr !important;
            gap: 12px !important;
        }
        :fullscreen .chart-card {
            height: 100% !important;
            padding: 12px 16px !important;
        }
        :fullscreen .chart-card h3 {
            margin-bottom: 8px !important;
        }

        .chart-card h3 { margin-top: 0; margin-bottom: 15px; font-size: 15px; color: var(--text-main); font-weight: 600; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

        .scrollable-chart-box-x { position: relative; flex: 1; width: 100%; overflow-x: auto; overflow-y: hidden; min-height: 0; }
        .scrollable-chart-box-y { position: relative; flex: 1; width: 100%; overflow-y: auto !important; overflow-x: hidden !important; min-height: 0; }
        .table-wrapper { width: 100%; overflow-x: auto; flex: 1; min-height: 0; }

        .pivot-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .pivot-table th { background: var(--panel-2); color: var(--sub); padding: 10px; font-weight: bold; border: 1px solid var(--border-color); position: sticky; top: 0; text-align: center; }
        .pivot-table td { padding: 10px; border: 1px solid var(--border-color); }
        .pivot-table tr:nth-child(even) { background: var(--stripe); }

        /* 4번 영역 배치 */
        .pie-split-container { 
            display: flex; width: 100%; flex: 1; min-height: 0;
            align-items: center; justify-content: space-between; 
            padding: 0 20px; box-sizing: border-box; 
        }
        .pie-left-box { width: 48%; display: flex; justify-content: center; align-items: center; height: 100%; min-height: 0; }
        .table-right-box { width: 48%; height: 95%; overflow-y: auto; border: 1px solid var(--border-color); border-radius: 6px; min-height: 0; }

        #inspector-pivot-body td { text-align: center !important; }

        .loading-view { text-align: center; font-size: 18px; padding: 15px; color: var(--accent-blue); font-weight: bold; flex-shrink: 0; }

        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 6px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--sub-dim); }
    </style>
</head>
<body>

    <div id="login-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg-dark); z-index:9999; display:none; justify-content:center; align-items:center;">
        <div style="width:320px; background:var(--card-bg); padding: 30px 24px; border-radius: 12px; border: 1px solid var(--border-color); box-shadow: var(--shadow-login); text-align:center; box-sizing: border-box;">
            <div style="margin-bottom: 20px; display: flex; justify-content: center; align-items: center;">
                <span style="display:inline-flex; align-items:center; justify-content:center; background:#ffffff; border-radius:8px; padding:8px 12px;">
                    <img src="assets/logo.jpg" alt="Company Logo" style="height: 36px; width: auto; object-fit: contain;" onerror="this.parentElement.style.display='none';">
                </span>
            </div>
            <h3 style="margin: 0 0 20px 0; font-size: 19px; color: var(--text-main); font-weight: bold;">현장 점검 접속 인증</h3>
            <input type="text" id="loginName" placeholder="이름" style="width:100%; height:42px; padding:0 12px; margin-bottom:12px; border:1px solid var(--border-color); border-radius:6px; font-size:14px; box-sizing:border-box; outline:none; background:var(--panel-2); color:var(--text-main);">
            <br>
            <input type="text" id="loginPhone" placeholder="전화번호" style="width:100%; height:42px; padding:0 12px; margin-bottom:20px; border:1px solid var(--border-color); border-radius:6px; font-size:14px; box-sizing:border-box; outline:none; background:var(--panel-2); color:var(--text-main);">
            <br>
            <button onclick="authenticate()" style="width:100%; height:42px; background:var(--accent-blue); color:var(--bg-dark); border:none; border-radius:6px; font-size:14px; font-weight:bold; cursor:pointer; box-sizing:border-box;">확인</button>
        </div>
    </div>

    <div id="dashboard-content">
        <div class="header-bar">
            <div class="header-left">
                <span class="company-logo-badge">
                    <img src="assets/logo.jpg" alt="Company Logo" class="company-logo" onerror="this.parentElement.style.display='none';">
                </span>
                <h2 id="dashboard-title">시설물 점검 실시간 모니터링 현황판</h2>
            </div>
            <div class="header-right">
                <button class="refresh-btn" onclick="loadDashboardData()">
                    <i class="fa-solid fa-rotate"></i> 현황 동기화
                </button>
                <button class="theme-toggle-btn" onclick="toggleTheme()" title="화면 테마 전환 (다크/라이트)">
                    <i class="fa-solid fa-sun"></i>
                    <i class="fa-solid fa-moon"></i>
                </button>
                <button class="refresh-btn" onclick="toggleFullScreen()" style="background: var(--btn-secondary-bg); color: var(--btn-secondary-text);">
                    <i class="fa-solid fa-expand"></i> 전체화면
                </button>  
            </div>
        </div>

        <div class="filter-bar">
            <div class="filter-group" id="centerFilterGroup" style="display:none;">
                <label for="centerSelect">센터: </label>
                <select id="centerSelect" class="filter-input" onchange="onCenterFilterChange()">
                    <option value="Master">전체 센터</option>
                </select>
            </div>

            <span id="centerFilterDivider" style="display:none; color:var(--divider);">|</span>

            <div class="filter-group">
                <i class="fa-regular fa-calendar-days"></i>
                <input type="date" id="startDate" class="filter-input"> ~ <input type="date" id="endDate" class="filter-input">
                <button type="button" onclick="resetDateFilter()" class="filter-input" style="margin-left: 5px; cursor: pointer; background: #161D26; border: 1px solid #232C36; padding: 0 8px; font-size: 12px; height: 100%; color:#8996A5;">선택 안함</button>
            </div>

            <span style="color:var(--divider);">|</span>

            <div class="filter-group">
                <label for="filterInspector">작업자: </label>
                <select id="filterInspector" class="filter-input">
                    <option value="all">전체 작업자</option>
                </select>
            </div>

            <span style="color:var(--divider);">|</span>

            <div class="filter-group">
                <label for="facilitySelect">설비: </label> <select id="facilitySelect" class="filter-input"> <option value="전체">전체 설비</option>
                    <option value="전기">전기설비</option>
                    <option value="소방">소방설비</option>
                    <option value="기계">기계설비</option> 
                    <option value="통신">통신설비</option> 
                </select>
            </div>

            <button class="refresh-btn" onclick="applyFilters()" style="padding: 7px 15px; font-size: 13px;">
                <i class="fa-solid fa-magnifying-glass"></i> 검색
            </button>
            <button class="hidden-logout-btn" onclick="logout()">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>로그아웃</span>
            </button>
        </div>

        <div id="loading-indicator" class="loading-view" style="display:none;">
            <i class="fas fa-spinner fa-spin"></i> 통합점검 데이터 분석 및 가공 중...
        </div>

        <div class="dashboard-grid">
            <div class="chart-card">
                <h3><i class="fas fa-chart-column"></i> 날짜별 설비 총 점검 횟수</h3>
                <div class="scrollable-chart-box-x" id="box-stacked">
                    <canvas id="stackedBarChart" style="display:block; height:100% !important;"></canvas>
                </div>
            </div>

            <div class="chart-card">
                <h3><i class="fa-solid fa-chart-bar"></i> 설비별 점검 횟수 Record Count</h3>
                <div class="scrollable-chart-box-y">
                    <div id="canvas-holder-y" style="width: 100%; height: 100%;">
                        <canvas id="horizontalBarChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="chart-card">
                <h3><i class="fa-solid fa-table"></i> 통합점검기록 피봇 테이블</h3>
                <div class="table-wrapper">
                    <table class="pivot-table">
                        <thead>
                            <tr id="pivot-header">
                                <th>설비ID</th>
                                <th>점검 총 건수</th>
                                <th>
                                    <a href="javascript:void(0)" onclick="openExcelModal()"
                                       style="color:#E7ECF1; text-decoration:underline; cursor:pointer;"
                                       title="전체 설비의 엑셀 보고서 목록 보기">
                                        보고서
                                    </a>
                                </th>
                            </tr>
                        </thead>
                        <tbody id="pivot-body"></tbody>
                    </table>
                </div>
            </div>

            <div class="chart-card">
                <h3><i class="fa-solid fa-chart-pie"></i> 점검자별 설비ID 비율 및 건수</h3>
                <div class="pie-split-container">
                    <div class="pie-left-box">
                        <canvas id="pieChart" style="width:100% !important; height:100% !important; max-height:240px;"></canvas>
                    </div>
                    <div class="table-right-box">
                        <table class="pivot-table" style="font-size: 12px; width: 100%;">
                            <thead>
                                <tr>
                                    <th style="padding: 6px; background: var(--panel-2); position: sticky; top: 0;">작업자</th>
                                    <th style="padding: 6px; background: var(--panel-2); position: sticky; top: 0;">점검 횟수</th>
                                </tr>
                            </thead>
                            <tbody id="inspector-pivot-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div id="global-loader" class="fullscreen-loader" style="display:none;">
            <div class="loader-box">
                <div class="spinner-circle"></div>
                <p class="loader-text">통합점검 데이터 분석 및 가공 중...</p>
            </div>
        </div>
    </div>

    <!-- ───────────────────────────────────────────────────────────
         엑셀 보고서 전체 목록 팝업 (3번 뷰 피봇 테이블 "보고서" 클릭 시)
         - 제목: 설비ID(위치명)
         - 10~20행씩 페이지네이션, 최신순 정렬은 서버(/api/excel-files)에서 처리
    ─────────────────────────────────────────────────────────── -->
    <div id="excel-modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:var(--modal-overlay-bg); z-index:10000; justify-content:center; align-items:center;">
        <div style="background:var(--card-bg); width:min(680px, 92vw); max-height:80vh; border-radius:14px; border: 1px solid var(--border-color); box-shadow:var(--shadow-modal); display:flex; flex-direction:column; overflow:hidden;">
            <div style="display:flex; align-items:center; justify-content:space-between; padding:18px 22px; border-bottom:1px solid var(--border-color);">
                <h3 id="excel-modal-title" style="margin:0; font-size:17px; color:var(--text-main);">
                    <i class="fa-solid fa-file-excel" style="color:#217346; margin-right:6px;"></i>설비ID
                </h3>
                <button onclick="closeExcelModal()" style="border:none; background:transparent; font-size:20px; color:var(--sub); cursor:pointer; line-height:1;">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <div id="excel-modal-body" style="padding:10px 22px; overflow-y:auto; flex:1;">
                <!-- JS로 채워짐: 로딩 / 목록 / 빈 상태 -->
            </div>

            <div id="excel-modal-pagination" style="display:flex; justify-content:center; align-items:center; gap:6px; padding:14px 22px; border-top:1px solid var(--border-color); flex-wrap:wrap;">
                <!-- JS로 채워짐: 페이지 번호 버튼 -->
            </div>
        </div>
    </div>

    <script>
        let chartInstances = {};
        let allRecords = [];
        let userCenter = "";
        const MASTER_CENTER_NAME = "Master"; // 서버(server.js)의 MASTER_CENTER_NAME과 동일해야 함

        Chart.register(ChartDataLabels);

        // ─────────────────────────────────────────────────────────
        // [신규] XSS 방어 헬퍼
        // Firestore에서 온 문자열(파일명, 위치명, 작업자명, 센터명 등)을
        // innerHTML에 넣기 전 반드시 이스케이프한다.
        // URL은 https만 허용해 javascript: 스킴 등을 차단한다.
        // ─────────────────────────────────────────────────────────
        // ─────────────────────────────────────────────────────────
        // [신규] 다크/라이트 테마 토글
        // Canvas(Chart.js)는 CSS var()를 직접 못 읽으므로, 실제 계산된 색상값을
        // getComputedStyle로 읽어와 차트 옵션에 그대로 넣어줍니다.
        // ─────────────────────────────────────────────────────────
        function cssVar(name) {
            return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
        }

        function applyTheme(theme) {
            document.documentElement.classList.toggle('light-theme', theme === 'light');
            localStorage.setItem('uiTheme', theme);
        }

        function toggleTheme() {
            const isLight = document.documentElement.classList.contains('light-theme');
            applyTheme(isLight ? 'dark' : 'light');
            // 차트는 canvas라 클래스만 바꿔선 안 바뀌므로, 현재 필터 기준으로 다시 그림
            if (typeof applyFilters === 'function' && allRecords.length >= 0) {
                applyFilters();
            }
        }

        (function initTheme() {
            const saved = localStorage.getItem('uiTheme');
            if (saved === 'light') document.documentElement.classList.add('light-theme');
        })();

        function escapeHtml(s) {
            return String(s ?? "").replace(/[&<>"']/g, c =>
                ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }
        function safeUrl(u) {
            return /^https:\/\//i.test(String(u || "")) ? String(u) : "";
        }

        // ─────────────────────────────────────────────────────────
        // [신규] 인증 포함 공통 fetch 헬퍼
        // - 로그인 시 발급받은 토큰을 Authorization 헤더로 첨부
        // - 401(세션 만료/무효) 응답이면 저장소를 비우고 로그인 화면 표시
        // - HTTP 에러 상태(500 등)도 명시적으로 throw해 원인 파악을 쉽게 함
        // ─────────────────────────────────────────────────────────
        async function apiFetch(path, options = {}) {
            const token = localStorage.getItem("authToken") || "";
            const headers = Object.assign({}, options.headers || {},
                token ? { "Authorization": "Bearer " + token } : {});
            const res = await fetch(`${API_BASE}${path}`, Object.assign({}, options, { headers }));

            if (res.status === 401) {
                localStorage.clear();
                document.getElementById('login-overlay').style.display = 'flex';
                throw new Error("세션이 만료되었습니다. 다시 로그인해주세요.");
            }
            if (!res.ok) {
                let msg = `HTTP ${res.status}`;
                try { const body = await res.json(); if (body.message) msg = body.message; } catch (e) {}
                throw new Error(msg);
            }
            return res.json();
        }

        window.onload = function() {
            document.getElementById("startDate").value = "";
            document.getElementById("endDate").value = "";

            const savedCenter = localStorage.getItem("userCenter");
            const savedToken = localStorage.getItem("authToken");

            // [수정] center와 토큰이 모두 있어야 자동 진입 (토큰 없으면 재로그인)
            if (savedCenter && savedToken) {
                userCenter = savedCenter;
                document.getElementById('dashboard-title').innerText = `[${userCenter}] 시설물 점검 실시간 모니터링 현황판`;
                document.getElementById('login-overlay').style.display = 'none';
                if (userCenter === MASTER_CENTER_NAME) initCenterFilter();
                loadDashboardData();
            } else {
                localStorage.clear();
                document.getElementById('login-overlay').style.display = 'flex';
            }
        }

        // ─────────────────────────────────────────────────────────
        // Master 전용 센터 필터
        // 드롭다운은 로그인 신원(userCenter)과 별개로 "지금 조회할 센터"만
        // 바꾼다. 서버에는 그 값을 그대로 넘겨서, 이미 검증된 센터별
        // 조회 로직(비-Master 로그인과 동일 경로)을 그대로 재사용한다.
        // → 서로 다른 센터가 같은 설비ID를 쓰더라도 섞일 위험이 없다.
        // ─────────────────────────────────────────────────────────
        async function initCenterFilter() {
            document.getElementById('centerFilterGroup').style.display = 'flex';
            document.getElementById('centerFilterDivider').style.display = 'inline';
            try {
                const result = await apiFetch(`/api/centers`);
                if (result.ok) {
                    const sel = document.getElementById('centerSelect');
                    const centers = result.centers || [];
                    // [수정] 센터명 이스케이프 적용
                    sel.innerHTML = `<option value="${MASTER_CENTER_NAME}">전체 센터</option>` +
                        centers.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join("");
                }
            } catch (e) {
                console.error("센터 목록 조회 실패:", e);
            }
        }

        function onCenterFilterChange() {
            const sel = document.getElementById('centerSelect');
            const chosen = sel ? sel.value : MASTER_CENTER_NAME;
            const label = chosen === MASTER_CENTER_NAME ? "Master (전체 센터)" : chosen;
            document.getElementById('dashboard-title').innerText = `[${label}] 시설물 점검 실시간 모니터링 현황판`;
            loadDashboardData(chosen);
        }

        function resetDateFilter() {
            document.getElementById("startDate").value = "";
            document.getElementById("endDate").value = "";
        }

        async function authenticate() {
            const name = document.getElementById('loginName').value;
            const phone = document.getElementById('loginPhone').value;

            if (!name || !phone) {
                alert("이름과 전화번호를 모두 입력해주세요.");
                return;
            }

            try {
                // 로그인은 토큰 발급 전이므로 apiFetch 대신 일반 fetch 사용
                const res = await fetch(`${API_BASE}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, phone })
                });
                const result = await res.json();

                if (result.ok) {
                    alert("로그인 성공! (" + result.center + " 소속)");

                    // [수정] 서버가 발급한 세션 토큰 저장 — 이후 모든 API 호출에 사용
                    localStorage.setItem("userCenter", result.center);
                    localStorage.setItem("authToken", result.token || "");
                    userCenter = result.center;

                    document.getElementById('dashboard-title').innerText = `[${result.center}] 시설물 점검 실시간 모니터링 현황판`;
                    document.getElementById('login-overlay').style.display = 'none';

                    if (userCenter === MASTER_CENTER_NAME) initCenterFilter();
                    loadDashboardData();
                } else {
                    alert(result.message || "인증 실패: 정보가 일치하지 않습니다.");
                }
            } catch (error) {
                console.error("인증 처리 중 오류:", error);
                alert("서버 연결에 문제가 발생했습니다.");
            }
        }

        function logout() {
            if(confirm("로그아웃 하시겠습니까?")) {
                localStorage.clear();
                location.reload();
            }
        }

        // /api/dashboard 응답에서 그대로 받아 전역 변수에 채워 넣습니다.
        let excelMap = {};
        let excelCountByFid = {};
        let fidLocations = {};
        let currentUserCenter = "";

        // [신규] 요청 순번 — Master 드롭다운을 빠르게 전환할 때
        // 늦게 도착한 이전 센터의 응답이 화면을 덮어쓰는 것(race condition)을 방지
        let dashboardRequestSeq = 0;

        async function loadDashboardData(overrideCenter) {
            const loginCenter = localStorage.getItem("userCenter");
            // Master로 로그인했고 드롭다운에서 특정 센터를 골랐다면 그 값을 우선 사용.
            // overrideCenter가 명시적으로 넘어오면(드롭다운 change) 그걸 최우선으로 쓴다.
            const queryCenter = overrideCenter
                || (loginCenter === MASTER_CENTER_NAME
                    ? (document.getElementById('centerSelect') ? document.getElementById('centerSelect').value : MASTER_CENTER_NAME)
                    : loginCenter);
            currentUserCenter = queryCenter || "";

            const reqId = ++dashboardRequestSeq;
            const loader = document.getElementById('global-loader');
            if (loader) loader.style.display = 'flex';

            try {
                // 서버는 center 단위 5분 캐시를 적용하므로, 동일 현장에서
                // 짧은 시간 내 반복 새로고침해도 실제 Firestore 읽기는 발생하지 않습니다.
                const result = await apiFetch(`/api/dashboard?center=${encodeURIComponent(currentUserCenter)}`);

                // [수정] 응답 도착 시점에 더 새로운 요청이 이미 나갔다면 이 결과는 버린다
                if (reqId !== dashboardRequestSeq) return;

                if (!result.ok) {
                    console.error("데이터 로드 오류:", result.message);
                    allRecords = [];
                    setFilterOptions(allRecords);
                    applyFilters();
                    return;
                }

                allRecords = result.records || [];
                excelMap = result.excelMap || {};
                excelCountByFid = result.excelCountByFid || {};
                fidLocations = result.fidLocations || {};

                setFilterOptions(allRecords);
                applyFilters();
            } catch (error) {
                console.error("데이터 로드 오류:", error);
            } finally {
                // 최신 요청의 로더만 끈다 (이전 요청이 나중에 끝나며 로더를 꺼버리는 것 방지)
                if (reqId === dashboardRequestSeq && loader) loader.style.display = 'none';
            }
        }

        // ─────────────────────────────────────────────────────────
        // 3번 뷰 헤더 "보고서" 클릭 시 뜨는 팝업
        // - openExcelModal(fid) : 특정 설비ID의 보고서만
        // - openExcelModal()    : 전체 설비의 보고서를 합쳐서 (헤더 클릭 시 이 모드)
        // - 최신순 정렬은 서버(/api/excel-files)가 처리, 페이지당 15건
        // ─────────────────────────────────────────────────────────
        const EXCEL_MODAL_PAGE_SIZE = 15;
        let excelModalState = { fid: "", page: 1 };

        async function openExcelModal(fid) {
            excelModalState = { fid: fid || "", page: 1 };

            const overlay = document.getElementById('excel-modal-overlay');
            const titleEl = document.getElementById('excel-modal-title');

            if (fid) {
                const locationText = fidLocations[fid] ? ` (${fidLocations[fid]})` : "";
                titleEl.innerHTML = `<i class="fa-solid fa-file-excel" style="color:#217346; margin-right:6px;"></i>${escapeHtml(fid)}${escapeHtml(locationText)}`;
            } else {
                titleEl.innerHTML = `<i class="fa-solid fa-file-excel" style="color:#217346; margin-right:6px;"></i>전체 설비 보고서 목록`;
            }

            overlay.style.display = 'flex';
            await loadExcelModalPage(1);
        }

        function closeExcelModal() {
            document.getElementById('excel-modal-overlay').style.display = 'none';
        }

        async function loadExcelModalPage(page) {
            const bodyEl = document.getElementById('excel-modal-body');
            const pagerEl = document.getElementById('excel-modal-pagination');
            const { fid } = excelModalState;
            excelModalState.page = page;

            bodyEl.innerHTML = `<div style="text-align:center; padding:30px; color:var(--sub-dim);"><i class="fa-solid fa-spinner fa-spin"></i> 불러오는 중...</div>`;
            pagerEl.innerHTML = "";

            try {
                const fidParam = fid ? `&fid=${encodeURIComponent(fid)}` : "";
                const result = await apiFetch(`/api/excel-files?center=${encodeURIComponent(currentUserCenter)}${fidParam}&page=${page}&pageSize=${EXCEL_MODAL_PAGE_SIZE}`);

                if (!result.ok) {
                    bodyEl.innerHTML = `<div style="text-align:center; padding:30px; color:var(--danger);">목록을 불러오지 못했습니다.</div>`;
                    return;
                }

                // 전체 모드(fid 없음)일 때만 각 행에 설비ID를 함께 표시
                renderExcelModalList(result.items || [], !fid);
                renderExcelModalPagination(result.page, result.totalPages, result.totalCount);
            } catch (error) {
                console.error("보고서 목록 조회 오류:", error);
                bodyEl.innerHTML = `<div style="text-align:center; padding:30px; color:var(--danger);">서버 연결에 문제가 발생했습니다.</div>`;
            }
        }

        function renderExcelModalList(items, showFid) {
            const bodyEl = document.getElementById('excel-modal-body');

            if (!items || items.length === 0) {
                bodyEl.innerHTML = `<div style="text-align:center; padding:30px; color:var(--sub-dim);">표시할 보고서가 없습니다.</div>`;
                return;
            }

            const rows = items.map(item => {
                // [버그 수정] 서버는 uploadedAt(camelCase)으로 내려주는데
                // 기존 코드는 item.uploaded_at을 읽어 날짜가 항상 "-"로 표시됐음
                const dateText = item.uploadedAt ? String(item.uploadedAt).substring(0, 10) : "-";
                const fileName = item.fileName || "보고서.xlsx";
                const url = safeUrl(item.file_url);

                // 설비ID(예: 전기_01)보다 위치명(예: 수변전일지_모니터링PC)이 더 중요하므로
                // "위치명 (설비ID)" 형식으로 위치명을 메인으로 보여줍니다.
                let fidBadge = "";
                if (showFid && item.fid) {
                    const locationName = fidLocations[item.fid];
                    const badgeText = locationName ? `${locationName} (${item.fid})` : item.fid;
                    fidBadge = `<span style="color:var(--accent-teal); font-weight:bold; font-size:12px; margin-right:8px; flex-shrink:0;">${escapeHtml(badgeText)}</span>`;
                }

                // url이 비정상(https 아님)이면 링크 비활성 표시
                const hrefAttr = url ? `href="${url}" target="_blank" rel="noopener"` : `href="javascript:void(0)" title="다운로드 링크 없음"`;

                return `
                    <a ${hrefAttr}
                       style="display:flex; align-items:center; justify-content:space-between; gap:10px; padding:12px 10px; border-bottom:1px solid var(--border-color); text-decoration:none; color:var(--text-main);"
                       onmouseover="this.style.background='var(--panel-2)'" onmouseout="this.style.background='transparent'">
                        <span style="display:flex; align-items:center; gap:8px; min-width:0;">
                            <i class="fa-solid fa-file-excel" style="color:#217346; flex-shrink:0;"></i>
                            ${fidBadge}
                            <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--sub); font-size:13px;">${escapeHtml(fileName)}</span>
                        </span>
                        <span style="display:flex; align-items:center; gap:10px; flex-shrink:0;">
                            <span style="color:var(--sub); font-size:13px;">${escapeHtml(dateText)}</span>
                            <i class="fa-solid fa-download" style="color:var(--sub-dim);"></i>
                        </span>
                    </a>`;
            }).join("");

            bodyEl.innerHTML = rows;
        }

        function renderExcelModalPagination(currentPage, totalPages, totalCount) {
            const pagerEl = document.getElementById('excel-modal-pagination');

            if (totalPages <= 1) {
                pagerEl.innerHTML = `<span style="color:var(--sub-dim); font-size:13px;">총 ${totalCount}건</span>`;
                return;
            }

            let buttonsHtml = `<span style="color:var(--sub-dim); font-size:13px; margin-right:10px;">총 ${totalCount}건</span>`;

            const pageBtnStyle = (active) => `
                min-width:30px; height:30px; padding:0 6px; border-radius:6px; border:1px solid ${active ? 'var(--accent-blue)' : 'var(--border-color)'};
                background:${active ? 'var(--accent-blue)' : 'var(--panel-2)'}; color:${active ? 'var(--bg-dark)' : 'var(--sub)'};
                font-weight:${active ? 'bold' : 'normal'}; cursor:pointer; font-size:13px;
            `;

            buttonsHtml += `<button onclick="loadExcelModalPage(${Math.max(1, currentPage - 1)})"
                style="${pageBtnStyle(false)}" ${currentPage === 1 ? 'disabled' : ''}>
                <i class="fa-solid fa-chevron-left"></i></button>`;

            const windowSize = 3;
            let start = Math.max(1, currentPage - windowSize);
            let end = Math.min(totalPages, currentPage + windowSize);

            if (start > 1) {
                buttonsHtml += `<button onclick="loadExcelModalPage(1)" style="${pageBtnStyle(false)}">1</button>`;
                if (start > 2) buttonsHtml += `<span style="color:var(--divider);">...</span>`;
            }

            for (let p = start; p <= end; p++) {
                buttonsHtml += `<button onclick="loadExcelModalPage(${p})" style="${pageBtnStyle(p === currentPage)}">${p}</button>`;
            }

            if (end < totalPages) {
                if (end < totalPages - 1) buttonsHtml += `<span style="color:var(--divider);">...</span>`;
                buttonsHtml += `<button onclick="loadExcelModalPage(${totalPages})" style="${pageBtnStyle(false)}">${totalPages}</button>`;
            }

            buttonsHtml += `<button onclick="loadExcelModalPage(${Math.min(totalPages, currentPage + 1)})"
                style="${pageBtnStyle(false)}" ${currentPage === totalPages ? 'disabled' : ''}>
                <i class="fa-solid fa-chevron-right"></i></button>`;

            pagerEl.innerHTML = buttonsHtml;
        }

        function setFilterOptions(records) {
            if (!records || records.length === 0) return;
            let inspectors = [...new Set(records.map(r => r.inspector))].filter(Boolean).sort();

            const insSelect = document.getElementById('filterInspector');
            const prevIns = insSelect.value;

            // [수정] 작업자명 이스케이프 적용
            insSelect.innerHTML = '<option value="all">전체 작업자</option>';
            inspectors.forEach(ins => insSelect.innerHTML += `<option value="${escapeHtml(ins)}">${escapeHtml(ins)}</option>`);

            if([...insSelect.options].some(o => o.value === prevIns)) insSelect.value = prevIns;
        }

        function applyFilters() {
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            const selectedInspector = document.getElementById('filterInspector').value;
            const selectedFacility = document.getElementById('facilitySelect').value;

            let filtered = allRecords.filter(r => {
                const rDate = r.date.replace(/[^0-9]/g, '-').substring(0, 10);
                const dateMatch = (!start || rDate >= start) && (!end || rDate <= end);
                const inspectorMatch = (selectedInspector === "all" || r.inspector === selectedInspector);

                let facilityMatch = false;
                if (selectedFacility === "전체") {
                    facilityMatch = true;
                } else {
                    facilityMatch = r.fid.includes(selectedFacility);
                }

                return dateMatch && inspectorMatch && facilityMatch;
            });

            buildDashboard(filtered);
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert(`전체화면 지원 안 함: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }

        // [수정] 전체화면 해제 시 location.reload() 대신 차트만 재빌드.
        // 기존 방식은 필터/스크롤 상태가 전부 날아가고 API도 다시 호출됐음.
        // 데이터(allRecords)는 이미 메모리에 있으므로 레이아웃 반영 후
        // applyFilters()로 차트만 다시 그리면 충분하다.
        document.addEventListener("fullscreenchange", () => {
            requestAnimationFrame(() => applyFilters());
        });

        function buildDashboard(records) {
            Object.keys(chartInstances).forEach(key => {
                if(chartInstances[key]) {
                    chartInstances[key].destroy();
                    chartInstances[key] = null;
                }
            });

            const palette = ['#5EA1FF', '#F5A623', '#C77DFF', '#84CC16', '#2DD4BF', '#EAB308', '#EC4899', '#34D399', '#818CF8', '#FB7185'];

            let dates = [...new Set(records.map(r => r.date))].filter(Boolean).sort();
            let fids = [...new Set(records.map(r => r.fid))].filter(Boolean).sort();
            let inspectors = [...new Set(records.map(r => r.inspector))].filter(Boolean).sort();

            const dateCount = dates.length;

            // [수정] 1번 뷰 제목: 로그인 신원(userCenter)이 아니라 "지금 조회 중인 센터"
            // (currentUserCenter)를 표시. Master가 드롭다운으로 특정 센터를 골라도
            // 제목이 계속 'Master'로 남아 있던 문제 해결.
            const displayCenter = currentUserCenter === MASTER_CENTER_NAME ? "전체 센터" : currentUserCenter;
            const firstCardTitle = document.querySelector('.chart-card h3');
            if (firstCardTitle && dates.length > 0) {
                let monthsInQuery = [...new Set(dates.map(d => {
                    const m = d.match(/-(\d{2})-/);
                    return m ? m[1] : null;
                }))].filter(Boolean).sort();

                let monthText = "";
                if (monthsInQuery.length > 1) {
                    monthText = `${monthsInQuery[0]}월~${monthsInQuery[monthsInQuery.length - 1]}월`;
                } else {
                    monthText = `${monthsInQuery[0]}월`;
                }

                firstCardTitle.innerHTML = `<i class="fas fa-chart-column"></i> [${monthText}] ${escapeHtml(displayCenter)} 설비 일별 점검 횟수`;
            } else if (firstCardTitle) {
                firstCardTitle.innerHTML = `<i class="fas fa-chart-column"></i> [전체 누적] ${escapeHtml(displayCenter)} 설비 일별 점검 횟수`;
            }

            // 1번 뷰
            const stackedCanvas = document.getElementById('stackedBarChart');
            if (dateCount > 7) {
                stackedCanvas.style.width = (dateCount * 75) + "px";
            } else {
                stackedCanvas.style.width = "100%";
            }

            let customDateLabels = dates.map(dateStr => {
                if(!dateStr) return "";
                const match = dateStr.match(/-(\d{2})$/);
                if(match) return parseInt(match[1], 10) + "일";
                return dateStr;
            });

            let dateCounts = dates.map(date => records.filter(r => r.date === date).length);
            let dateColors = dates.map((_, idx) => palette[idx % palette.length]);

            chartInstances.stackedBarChart = new Chart(stackedCanvas, {
                type: 'bar',
                data: {
                    labels: customDateLabels,
                    datasets: [{
                        label: '일일 총 점검 횟수',
                        data: dateCounts,
                        backgroundColor: dateColors,
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, ticks: { stepSize: 1, color: cssVar('--chart-tick') }, grid: { color: cssVar('--chart-grid') }, grace: '15%' },
                        x: { ticks: { color: cssVar('--chart-tick'), maxRotation: 0, minRotation: 0 }, grid: { display: false } }
                    },
                    plugins: {
                        legend: { display: false },
                        datalabels: {
                            anchor: 'end', align: 'top', color: cssVar('--chart-label'),
                            font: { weight: 'bold', size: 11 },
                            formatter: (val) => val > 0 ? val + '건' : ''
                        }
                    }
                }
            });

            // 2번 뷰
            const horizontalCanvas = document.getElementById('horizontalBarChart');
            const categories = {
                "🚨 소방설비": 0, "⚡ 전기설비": 0, "👮‍♂️ 순찰기록": 0, "⚙️ 기계/공조": 0, "🛠️ 기타설비": 0
            };

            records.forEach(r => {
                const fid = r.fid || "";
                if (fid.includes('소방')) categories["🚨 소방설비"]++;
                else if (fid.includes('전기')) categories["⚡ 전기설비"]++;
                else if (fid.includes('순찰')) categories["👮‍♂️ 순찰기록"]++;
                else if (fid.includes('기계') || fid.includes('공조')) categories["⚙️ 기계/공조"]++;
                else categories["🛠️ 기타설비"]++;
            });

            const categoryLabels = Object.keys(categories);
            const categoryData = Object.values(categories);
            let categoryColors = categoryLabels.map((_, idx) => palette[idx % palette.length]);

            chartInstances.horizontalBarChart = new Chart(horizontalCanvas, {
                type: 'bar',
                data: {
                    labels: categoryLabels,
                    datasets: [{
                        data: categoryData,
                        backgroundColor: categoryColors,
                        barThickness: 22,
                        borderRadius: 4
                    }]
                },
                options: {
                    indexAxis: 'y', responsive: true, maintainAspectRatio: false,
                    scales: {
                        x: { beginAtZero: true, ticks: { stepSize: 1, color: cssVar('--chart-tick') }, grid: { color: cssVar('--chart-grid') }, grace: '15%' },
                        y: { ticks: { color: cssVar('--chart-label-strong'), font: { weight: 'bold', size: 12 } }, grid: { display: false } }
                    },
                    plugins: {
                        legend: { display: false },
                        datalabels: {
                            anchor: 'end', align: 'right', color: cssVar('--chart-label'),
                            font: { weight: 'bold', size: 11 },
                            formatter: (val) => val > 0 ? val + '건' : ''
                        }
                    }
                }
            });

            // 3번 뷰
            const pivotBody = document.getElementById('pivot-body');
            let tableHtml = "";
            fids.forEach(fid => {
                let totalCount = records.filter(r => r.fid === fid).length;

                // excelMap[fid]는 설비당 가장 최신(정렬 기준 첫 번째) 엑셀 파일 1건의 링크입니다.
                // 아이콘 클릭 시 그 파일이 바로 새 탭에서 다운로드됩니다. (기존 동작 그대로)
                let finalUrl = safeUrl(excelMap[fid] || "");

                let excelIcon = (finalUrl !== "") ?
                    `<a href="${finalUrl}" target="_blank" rel="noopener" style="color:#217346; font-size:18px;" title="최신 엑셀 보고서 바로 다운로드">
                        <i class="fa-solid fa-file-excel"></i>
                    </a>` :
                    `<span style="color:var(--sub-dim);">-</span>`;

                const locationText = fidLocations[fid] ? ` (${fidLocations[fid]})` : "";

                // [수정] fid/위치명 이스케이프 적용
                tableHtml += `<tr>
                    <td style="font-weight:bold; color:var(--text-main); text-align:left; padding-left:20px;">
                        ${escapeHtml(fid)}<span style="color:var(--sub); font-weight:normal;">${escapeHtml(locationText)}</span>
                    </td>
                    <td style="font-weight:bold; color:var(--accent-blue); text-align:center;">${totalCount} 건</td>
                    <td style="text-align:center;">${excelIcon}</td>
                </tr>`;
            });
            pivotBody.innerHTML = tableHtml || `<tr><td colspan="3" style="color:var(--sub-dim); padding:40px; text-align:center;">데이터가 없습니다.</td></tr>`;

            // 4번 뷰
            let inspectorDataList = inspectors.map((ins, idx) => {
                return { name: ins, count: records.filter(r => r.inspector === ins).length, color: palette[idx % palette.length] };
            });
            inspectorDataList.sort((a, b) => b.count - a.count);

            let sortedLabels = inspectorDataList.map(item => item.name);
            let sortedCounts = inspectorDataList.map(item => item.count);
            let sortedColors = inspectorDataList.map(item => item.color);
            let total = sortedCounts.reduce((a, b) => a + b, 0);

            const inspectorPivotBody = document.getElementById('inspector-pivot-body');
            let inspectorTableHtml = "";
            inspectorDataList.forEach(item => {
                // [수정] 작업자명 이스케이프 적용
                inspectorTableHtml += `<tr>
                    <td style="font-weight: bold; color: var(--text-main);">
                        <span style="display:inline-block; width:10px; height:10px; background-color:${item.color}; border-radius:50%; margin-right:6px;"></span>${escapeHtml(item.name)}
                    </td>
                    <td style="font-weight: bold; color: var(--sub);">${item.count} 건</td>
                </tr>`;
            });
            inspectorPivotBody.innerHTML = inspectorTableHtml || `<tr><td colspan="2" style="color:var(--sub-dim); padding:20px;">기록 없음</td></tr>`;

            const pieCanvas = document.getElementById('pieChart');
            chartInstances.pieChart = new Chart(pieCanvas, {
                type: 'pie',
                data: {
                    labels: sortedLabels,
                    datasets: [{ data: sortedCounts, backgroundColor: sortedColors }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: {
                        datalabels: {
                            color: cssVar('--chart-datalabel-onpie'), font: { weight: 'bold', size: 11 },
                            formatter: function(value, context) {
                                if (total === 0) return '';
                                let percentage = ((value / total) * 100).toFixed(1);
                                if (percentage < 6) return '';
                                return context.chart.data.labels[context.dataIndex] + '\n' + percentage + '%';
                            },
                            align: 'center', anchor: 'center', textAlign: 'center'
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let value = context.raw;
                                    let percentage = total > 0 ? ((value / total) * 100).toFixed(1) : 0;
                                    return ` ${context.label}: ${value}건 (${percentage}%)`;
                                }
                            }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
