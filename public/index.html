<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시설물 점검 모니터링 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" 
      media="print" onload="this.media='all'">
    <script>
      // ─────────────────────────────────────────────────────────
      // [구조 변경] Firebase SDK 및 클라이언트 직접 접속 로직을 제거했습니다.
      // 모든 Firestore 읽기는 Cloud Run API 서버(/api/*)가 전담합니다.
      // 같은 출처(同源)로 배포 시 API_BASE는 빈 문자열로 두면 됩니다.
      // 다른 도메인에서 호스팅한다면 아래 값을 Cloud Run 서비스 URL로 바꾸세요.
      // 예: const API_BASE = "https://facility-dashboard-xxxxx-an.a.run.app";
      // ─────────────────────────────────────────────────────────
      const API_BASE = "";
    </script>  
    <style>
        :root {
            --bg-dark: #f4f6f9;
            --card-bg: #ffffff;
            --text-main: #333333;
            --border-color: #e2e8f0;
            --accent-blue: #3b82f6;
        }
        
        /* [일반 창 모드 기본값] */
        html, body {
            margin: 0; box-sizing: border-box; height: auto !important; overflow: auto !important;
        }
        body {
            padding: 20px; font-family: 'Malgun Gothic', dotum, sans-serif; background: var(--bg-dark); color: var(--text-main);
            display: flex; flex-direction: column;
        }
        
        #dashboard-content {
            display: flex; flex-direction: column; width: 100%;
        }
        
        .header-bar {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid var(--border-color); flex-shrink: 0;
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        
        /* 헤더 우측 버튼 그룹 정의 */
        .header-right { 
            display: flex; align-items: center; gap: 10px; white-space: nowrap; 
        }
        
        .company-logo {
            height: 52px; width: auto; object-fit: contain; transform-origin: center center;
            animation: waveFlag 3s ease-in-out infinite alternate;
            filter: drop-shadow(2px 4px 6px rgba(0, 0, 0, 0.15));
        }
        
        @keyframes waveFlag {
            0% { transform: translate(0, 0) rotateX(0deg) rotateY(-5deg) skewY(-1deg); }
            5% { transform: translate(1px, -1px) rotateX(2deg) rotateY(5deg) skewY(1deg); }
            100% { transform: translate(-1px, 2px) rotateX(-2deg) rotateY(10deg) skewY(1deg); }
        }

        .fullscreen-loader {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(0.5px); -webkit-backdrop-filter: blur(0.5px);
            display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .loader-box { text-align: center; }
        .spinner-circle {
            width: 50px; height: 50px; border: 5px solid #e2e8f0; border-top: 5px solid #3b82f6; border-radius: 50%;
            animation: loader-spin 1s linear infinite; margin: 0 auto 15px;
        }
        .loader-text { font-size: 16px; font-weight: bold; color: #1e293b; margin: 0; }

        @keyframes loader-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .header-bar h2 { margin: 0; font-size: 24px; color: #1e293b; }
        
        /* 기본 상단 버튼 스타일 */
        .refresh-btn {
            background: var(--accent-blue); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s;
        }
        .refresh-btn:hover { background: #1d4ed8; }
        
        /* 💡 [트릭 구현] 변신형 비밀 로그아웃 버튼 애니메이션 효과 */
        .hidden-logout-btn {
            background: #cbd5e1; /* 평소에는 연한 회색 세로선처럼 보이도록 설정 */
            color: transparent;  /* 글자 숨김 */
            border: none;
            width: 4px;          /* 평소에는 'I' 모양처럼 얇게 */
            height: 32px;        /* 세로선 두께감 구현 */
            padding: 0 !important;
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1); /* 부드럽고 찰진 변신 모션 */
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            
            /* 💡 버튼 자체를 오른쪽 끝으로 강제 배달 시킵니다 */
            margin-left: auto; 
        }
        
        /* 로그아웃 안쪽 아이콘/텍스트 감싸는 레이어 */
        .hidden-logout-btn span, 
        .hidden-logout-btn i {
            opacity: 0;
            transition: opacity 0.2s ease;
            white-space: nowrap;
        }
        
        /* 💡 [수정] 중요! `.filter-bar:hover` 조건을 삭제했습니다.
           이제 오직 버튼 자기 자신(`.hidden-logout-btn:hover`) 위에 마우스가 올라갔을 때만 펴집니다! */
        .hidden-logout-btn:hover {
            background: #ef4444; /* 마우스 오면 강렬한 레드로 변경 */
            color: white;
            width: 105px;        /* 원래 버튼 너비로 쫙 펼쳐짐 */
            height: 32px;        /* 일반 버튼 크기로 팽창 */
            padding: 0 15px !important;
            border-radius: 6px;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        /* 💡 [수정] 내부 글씨 서서히 등장 조건도 버튼 자체 호버(`:hover`)로 통일 */
        .hidden-logout-btn:hover span,
        .hidden-logout-btn:hover i {
            opacity: 1;
            transition: opacity 0.2s ease;
            transition-delay: 0.15s; /* 노출 타이밍 조율 */
        }
        
        .filter-bar {
            background: var(--card-bg); padding: 12px 15px; border-radius: 12px; margin-bottom: 15px; display: flex; gap: 15px; align-items: center; flex-wrap: wrap; border: 1px solid var(--border-color); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); flex-shrink: 0;
        }
        .filter-group { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: bold; color: #475569; }
        .filter-input { padding: 6px 10px; border: 1px solid var(--border-color); border-radius: 6px; font-family: inherit; }
        
        /* [일반 창 모드] 고정 격자 구조 */
        .dashboard-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
            margin-bottom: 10px;
        }
        .chart-card { 
            background: var(--card-bg); border-radius: 12px; padding: 20px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid var(--border-color); 
            box-sizing: border-box; display: flex; flex-direction: column; min-height: 0;
            height: 360px !important;
            overflow: hidden;
        }
        
        /* [전체화면 모드 전용 스타일] */
        :-webkit-full-screen body { height: 100vh !important; padding: 12px !important; overflow: hidden !important; }
        :-ms-fullscreen body { height: 100vh !important; padding: 12px !important; overflow: hidden !important; }
        :fullscreen body {
            height: 100vh !important; padding: 12px !important; overflow: hidden !important;
        }
        :fullscreen #dashboard-content {
            height: 100% !important;
        }
        :fullscreen .header-bar {
            margin-bottom: 8px !important; padding-bottom: 6px !important;
        }
        :fullscreen .filter-bar {
            margin-bottom: 10px !important; padding: 8px 12px !important;
        }
        :fullscreen .dashboard-grid {
            flex: 1 !important;
            min-height: 0 !important;
            grid-template-rows: 1fr 1fr !important;
            gap: 12px !important;
        }
        :fullscreen .chart-card {
            height: 100% !important;
            padding: 12px 16px !important;
        }
        :fullscreen .chart-card h3 {
            margin-bottom: 8px !important;
        }

        .chart-card h3 { margin-top: 0; margin-bottom: 15px; font-size: 16px; color: #475569; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        
        .scrollable-chart-box-x { position: relative; flex: 1; width: 100%; overflow-x: auto; overflow-y: hidden; min-height: 0; }
        .scrollable-chart-box-y { position: relative; flex: 1; width: 100%; overflow-y: auto !important; overflow-x: hidden !important; min-height: 0; }
        .table-wrapper { width: 100%; overflow-x: auto; flex: 1; min-height: 0; }
        
        .pivot-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .pivot-table th { background: #edf2f7; color: #4a5568; padding: 10px; font-weight: bold; border: 1px solid var(--border-color); position: sticky; top: 0; text-align: center; }
        .pivot-table td { padding: 10px; border: 1px solid var(--border-color); }
        .pivot-table tr:nth-child(even) { background: #f8fafc; }
        
        /* 4번 영역 배치 */
        .pie-split-container { 
            display: flex; width: 100%; flex: 1; min-height: 0;
            align-items: center; justify-content: space-between; 
            padding: 0 20px; box-sizing: border-box; 
        }
        .pie-left-box { width: 48%; display: flex; justify-content: center; align-items: center; height: 100%; min-height: 0; }
        .table-right-box { width: 48%; height: 95%; overflow-y: auto; border: 1px solid var(--border-color); border-radius: 6px; min-height: 0; }

        #inspector-pivot-body td { text-align: center !important; }
        
        .loading-view { text-align: center; font-size: 18px; padding: 15px; color: var(--accent-blue); font-weight: bold; flex-shrink: 0; }
    </style>
</head>
<body>

    <div id="login-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#f8fafc; z-index:9999; display:none; justify-content:center; align-items:center;">
        <div style="width:320px; background:#ffffff; padding: 30px 24px; border-radius: 12px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); text-align:center; box-sizing: border-box;">
            <div style="margin-bottom: 20px; display: flex; justify-content: center; align-items: center;">
                <img src="assets/logo.jpg" alt="Company Logo" style="height: 48px; width: auto; object-fit: contain;" onerror="this.style.display='none';">
            </div>
            <h3 style="margin: 0 0 20px 0; font-size: 19px; color: #1e293b; font-weight: bold;">현장 점검 접속 인증</h3>
            <input type="text" id="loginName" placeholder="이름" style="width:100%; height:42px; padding:0 12px; margin-bottom:12px; border:1px solid #e2e8f0; border-radius:6px; font-size:14px; box-sizing:border-box; outline:none;">
            <br>
            <input type="text" id="loginPhone" placeholder="전화번호" style="width:100%; height:42px; padding:0 12px; margin-bottom:20px; border:1px solid #e2e8f0; border-radius:6px; font-size:14px; box-sizing:border-box; outline:none;">
            <br>
            <button onclick="authenticate()" style="width:100%; height:42px; background:#3b82f6; color:white; border:none; border-radius:6px; font-size:14px; font-weight:bold; cursor:pointer; box-sizing:border-box;">확인</button>
        </div>
    </div>

    <div id="dashboard-content">
        <div class="header-bar">
            <div class="header-left">
                <img src="assets/logo.jpg" alt="Company Logo" class="company-logo" onerror="this.style.display='none';">
                <h2 id="dashboard-title">시설물 점검 실시간 모니터링 현황판</h2>
            </div>
            <div class="header-right">
                <button class="refresh-btn" onclick="loadDashboardData()">
                    <i class="fa-solid fa-rotate"></i> 현황 동기화
                </button>
                <button class="refresh-btn" onclick="toggleFullScreen()" style="background: #4b5563;">
                    <i class="fa-solid fa-expand"></i> 전체화면
                </button>  
            </div>
        </div>

        <div class="filter-bar">
            <div class="filter-group">
                <i class="fa-regular fa-calendar-days"></i>
                <input type="date" id="startDate" class="filter-input"> ~ <input type="date" id="endDate" class="filter-input">
                <button type="button" onclick="resetDateFilter()" class="filter-input" style="margin-left: 5px; cursor: pointer; background: #f1f5f9; border: 1px solid #cbd5e1; padding: 0 8px; font-size: 12px; height: 100%;">선택 안함</button>
            </div>
            
            <span>|</span>
            
            <div class="filter-group">
                <label for="filterInspector">작업자: </label>
                <select id="filterInspector" class="filter-input">
                    <option value="all">전체 작업자</option>
                </select>
            </div>
            
            <span>|</span>
            
            <div class="filter-group">
                <label for="facilitySelect">설비: </label> <select id="facilitySelect" class="filter-input"> <option value="전체">전체 설비</option>
                    <option value="전기">전기설비</option>
                    <option value="소방">소방설비</option>
                    <option value="기계">기계설비</option> 
                    <option value="통신">통신설비</option> 
                </select>
            </div>
            
            <button class="refresh-btn" onclick="applyFilters()" style="padding: 7px 15px; font-size: 13px;">
                <i class="fa-solid fa-magnifying-glass"></i> 검색
            </button>
            <button class="hidden-logout-btn" onclick="logout()">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>로그아웃</span>
            </button>
        </div>

        <div id="loading-indicator" class="loading-view" style="display:none;">
            <i class="fas fa-spinner fa-spin"></i> 통합점검 데이터 분석 및 가공 중...
        </div>

        <div class="dashboard-grid">
            <div class="chart-card">
                <h3><i class="fas fa-chart-column"></i> 날짜별 설비 총 점검 횟수</h3>
                <div class="scrollable-chart-box-x" id="box-stacked">
                    <canvas id="stackedBarChart" style="display:block; height:100% !important;"></canvas>
                </div>
            </div>

            <div class="chart-card">
                <h3><i class="fa-solid fa-chart-bar"></i> 설비별 점검 횟수 Record Count</h3>
                <div class="scrollable-chart-box-y">
                    <div id="canvas-holder-y" style="width: 100%; height: 100%;">
                        <canvas id="horizontalBarChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="chart-card">
                <h3><i class="fa-solid fa-table"></i> 통합점검기록 피봇 테이블</h3>
                <div class="table-wrapper">
                    <table class="pivot-table">
                        <thead>
                            <tr id="pivot-header">
                                <th>설비ID</th>
                                <th>점검 총 건수</th>
                                <th>
                                    <a href="javascript:void(0)" onclick="openExcelModal()"
                                       style="color:#1e293b; text-decoration:underline; cursor:pointer;"
                                       title="전체 설비의 엑셀 보고서 목록 보기">
                                        보고서
                                    </a>
                                </th>
                            </tr>
                        </thead>
                        <tbody id="pivot-body"></tbody>
                    </table>
                </div>
            </div>

            <div class="chart-card">
                <h3><i class="fa-solid fa-chart-pie"></i> 점검자별 설비ID 비율 및 건수</h3>
                <div class="pie-split-container">
                    <div class="pie-left-box">
                        <canvas id="pieChart" style="width:100% !important; height:100% !important; max-height:240px;"></canvas>
                    </div>
                    <div class="table-right-box">
                        <table class="pivot-table" style="font-size: 12px; width: 100%;">
                            <thead>
                                <tr>
                                    <th style="padding: 6px; background: #f1f5f9; position: sticky; top: 0;">작업자</th>
                                    <th style="padding: 6px; background: #f1f5f9; position: sticky; top: 0;">점검 횟수</th>
                                </tr>
                            </thead>
                            <tbody id="inspector-pivot-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div id="global-loader" class="fullscreen-loader" style="display:none;">
            <div class="loader-box">
                <div class="spinner-circle"></div>
                <p class="loader-text">통합점검 데이터 분석 및 가공 중...</p>
            </div>
        </div>
    </div>

    <!-- ───────────────────────────────────────────────────────────
         엑셀 보고서 전체 목록 팝업 (3번 뷰 피봇 테이블 "보고서" 클릭 시)
         - 제목: 설비ID(위치명)
         - 10~20행씩 페이지네이션, 최신순 정렬은 서버(/api/excel-files)에서 처리
    ─────────────────────────────────────────────────────────── -->
    <div id="excel-modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15,23,42,0.55); z-index:10000; justify-content:center; align-items:center;">
        <div style="background:#fff; width:min(680px, 92vw); max-height:80vh; border-radius:14px; box-shadow:0 20px 60px rgba(0,0,0,0.25); display:flex; flex-direction:column; overflow:hidden;">
            <div style="display:flex; align-items:center; justify-content:space-between; padding:18px 22px; border-bottom:1px solid #e2e8f0;">
                <h3 id="excel-modal-title" style="margin:0; font-size:17px; color:#1e293b;">
                    <i class="fa-solid fa-file-excel" style="color:#217346; margin-right:6px;"></i>설비ID
                </h3>
                <button onclick="closeExcelModal()" style="border:none; background:transparent; font-size:20px; color:#64748b; cursor:pointer; line-height:1;">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <div id="excel-modal-body" style="padding:10px 22px; overflow-y:auto; flex:1;">
                <!-- JS로 채워짐: 로딩 / 목록 / 빈 상태 -->
            </div>

            <div id="excel-modal-pagination" style="display:flex; justify-content:center; align-items:center; gap:6px; padding:14px 22px; border-top:1px solid #e2e8f0; flex-wrap:wrap;">
                <!-- JS로 채워짐: 페이지 번호 버튼 -->
            </div>
        </div>
    </div>

    <script> 
        let chartInstances = {};
        let allRecords = []; 
        let userCenter = "";
        let lastKnownTime = 0; 
        
        Chart.register(ChartDataLabels);

        window.onload = function() {
            document.getElementById("startDate").value = ""; 
            document.getElementById("endDate").value = ""; 
            
            const savedCenter = localStorage.getItem("userCenter");
            if (savedCenter) {
                userCenter = savedCenter;
                document.getElementById('dashboard-title').innerText = `[${userCenter}] 시설물 점검 실시간 모니터링 현황판`;
                document.getElementById('login-overlay').style.display = 'none';
                loadDashboardData();
            } else {
                document.getElementById('login-overlay').style.display = 'flex';
            }
        }

        function resetDateFilter() {
            document.getElementById("startDate").value = "";
            document.getElementById("endDate").value = ""; 
        }
        
        async function authenticate() {
            const name = document.getElementById('loginName').value;
            const phone = document.getElementById('loginPhone').value;

            if (!name || !phone) {
                alert("이름과 전화번호를 모두 입력해주세요.");
                return;
            }

            try {
                // [구조 변경] Firestore 직접 조회 대신 Cloud Run API 서버로 인증 위임
                const res = await fetch(`${API_BASE}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, phone })
                });
                const result = await res.json();

                if (result.ok) {
                    alert("로그인 성공! (" + result.center + " 소속)");

                    localStorage.setItem("userCenter", result.center);

                    document.getElementById('dashboard-title').innerText = `[${result.center}] 시설물 점검 실시간 모니터링 현황판`;
                    document.getElementById('login-overlay').style.display = 'none';

                    loadDashboardData();
                } else {
                    alert(result.message || "인증 실패: 등록되지 않은 사용자이거나 정보가 일치하지 않습니다.");
                }
            } catch (error) {
                console.error("인증 처리 중 오류:", error);
                alert("서버 연결에 문제가 발생했습니다.");
            }
        }

        function logout() {
            if(confirm("로그아웃 하시겠습니까?")) {
                localStorage.clear();
                location.reload();
            }
        }

        // 전역 변수로 리스너를 관리하여 나중에 중복 실행 방지
        let unsubscribe = null;
        let debounceTimer = null;

        // [구조 변경] excelMap, fidLocations는 더 이상 클라이언트에서 만들지 않고
        // /api/dashboard 응답에서 그대로 받아 전역 변수에 채워 넣습니다.
        let excelMap = {};
        let excelCountByFid = {};
        let fidLocations = {};
        let currentUserCenter = "";

        async function loadDashboardData() {
            const userCenter = localStorage.getItem("userCenter");
            currentUserCenter = userCenter || "";
            const loader = document.getElementById('global-loader');
            if (loader) loader.style.display = 'flex';

            try {
                // [구조 변경] Firestore 직접 조회(inspection_logs, MaxerveUlsan_Excel) 대신
                // Cloud Run API 서버 한 번 호출로 가공된 데이터를 받아옵니다.
                // 서버는 center 단위로 5분 캐시를 적용하므로, 동일 현장에서
                // 짧은 시간 내 반복 새로고침해도 실제 Firestore 읽기는 발생하지 않습니다.
                const res = await fetch(`${API_BASE}/api/dashboard?center=${encodeURIComponent(userCenter)}`);
                const result = await res.json();

                if (!result.ok) {
                    console.error("데이터 로드 오류:", result.message);
                    allRecords = [];
                    setFilterOptions(allRecords);
                    applyFilters();
                    return;
                }

                allRecords = result.records || [];
                excelMap = result.excelMap || {};
                excelCountByFid = result.excelCountByFid || {};
                fidLocations = result.fidLocations || {};

                setFilterOptions(allRecords);
                applyFilters();
            } catch (error) {
                console.error("데이터 로드 오류:", error);
            } finally {
                if (loader) loader.style.display = 'none';
            }
        }

        // ─────────────────────────────────────────────────────────
        // 3번 뷰 헤더 "보고서" 클릭 시 뜨는 팝업
        // - openExcelModal(fid) : 특정 설비ID의 보고서만
        // - openExcelModal()    : 전체 설비의 보고서를 합쳐서 (헤더 클릭 시 이 모드)
        // - 최신순 정렬은 서버(/api/excel-files)가 처리, 페이지당 15건
        // - 페이지 번호(1 2 3 ...) 클릭으로 이동, 우상단 X 버튼으로 닫기
        // ─────────────────────────────────────────────────────────
        const EXCEL_MODAL_PAGE_SIZE = 15;
        let excelModalState = { fid: "", page: 1 };

        async function openExcelModal(fid) {
            excelModalState = { fid: fid || "", page: 1 };

            const overlay = document.getElementById('excel-modal-overlay');
            const titleEl = document.getElementById('excel-modal-title');

            if (fid) {
                const locationText = fidLocations[fid] ? ` (${fidLocations[fid]})` : "";
                titleEl.innerHTML = `<i class="fa-solid fa-file-excel" style="color:#217346; margin-right:6px;"></i>${fid}${locationText}`;
            } else {
                titleEl.innerHTML = `<i class="fa-solid fa-file-excel" style="color:#217346; margin-right:6px;"></i>전체 설비 보고서 목록`;
            }

            overlay.style.display = 'flex';
            await loadExcelModalPage(1);
        }

        function closeExcelModal() {
            document.getElementById('excel-modal-overlay').style.display = 'none';
        }

        async function loadExcelModalPage(page) {
            const bodyEl = document.getElementById('excel-modal-body');
            const pagerEl = document.getElementById('excel-modal-pagination');
            const { fid } = excelModalState;
            excelModalState.page = page;

            bodyEl.innerHTML = `<div style="text-align:center; padding:30px; color:#94a3b8;"><i class="fa-solid fa-spinner fa-spin"></i> 불러오는 중...</div>`;
            pagerEl.innerHTML = "";

            try {
                const fidParam = fid ? `&fid=${encodeURIComponent(fid)}` : "";
                const url = `${API_BASE}/api/excel-files?center=${encodeURIComponent(currentUserCenter)}${fidParam}&page=${page}&pageSize=${EXCEL_MODAL_PAGE_SIZE}`;
                const res = await fetch(url);
                const result = await res.json();

                if (!result.ok) {
                    bodyEl.innerHTML = `<div style="text-align:center; padding:30px; color:#ef4444;">목록을 불러오지 못했습니다.</div>`;
                    return;
                }

                // 전체 모드(fid 없음)일 때만 각 행에 설비ID를 함께 표시
                renderExcelModalList(result.items || [], !fid);
                renderExcelModalPagination(result.page, result.totalPages, result.totalCount);
            } catch (error) {
                console.error("보고서 목록 조회 오류:", error);
                bodyEl.innerHTML = `<div style="text-align:center; padding:30px; color:#ef4444;">서버 연결에 문제가 발생했습니다.</div>`;
            }
        }

        function renderExcelModalList(items, showFid) {
            const bodyEl = document.getElementById('excel-modal-body');

            if (!items || items.length === 0) {
                bodyEl.innerHTML = `<div style="text-align:center; padding:30px; color:#94a3b8;">표시할 보고서가 없습니다.</div>`;
                return;
            }

            const rows = items.map(item => {
                const dateText = item.uploaded_at ? String(item.uploaded_at).substring(0, 10) : "-";
                const fileName = item.fileName || "보고서.xlsx";

                // [구조 변경] 설비ID(예: 전기_01)보다 위치명(예: 수변전일지_모니터링PC)이 더 중요하므로
                // "위치명 (설비ID)" 형식으로 위치명을 메인으로 보여줍니다.
                let fidBadge = "";
                if (showFid && item.fid) {
                    const locationName = fidLocations[item.fid];
                    const badgeText = locationName ? `${locationName} (${item.fid})` : item.fid;
                    fidBadge = `<span style="color:#217346; font-weight:bold; font-size:12px; margin-right:8px; flex-shrink:0;">${badgeText}</span>`;
                }

                return `
                    <a href="${item.file_url}" target="_blank" rel="noopener"
                       style="display:flex; align-items:center; justify-content:space-between; gap:10px; padding:12px 10px; border-bottom:1px solid #f1f5f9; text-decoration:none; color:#1e293b;"
                       onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='transparent'">
                        <span style="display:flex; align-items:center; gap:8px; min-width:0;">
                            <i class="fa-solid fa-file-excel" style="color:#217346; flex-shrink:0;"></i>
                            ${fidBadge}
                            <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:#64748b; font-size:13px;">${fileName}</span>
                        </span>
                        <span style="display:flex; align-items:center; gap:10px; flex-shrink:0;">
                            <span style="color:#64748b; font-size:13px;">${dateText}</span>
                            <i class="fa-solid fa-download" style="color:#94a3b8;"></i>
                        </span>
                    </a>`;
            }).join("");

            bodyEl.innerHTML = rows;
        }

        function renderExcelModalPagination(currentPage, totalPages, totalCount) {
            const pagerEl = document.getElementById('excel-modal-pagination');

            if (totalPages <= 1) {
                pagerEl.innerHTML = `<span style="color:#94a3b8; font-size:13px;">총 ${totalCount}건</span>`;
                return;
            }

            let buttonsHtml = `<span style="color:#94a3b8; font-size:13px; margin-right:10px;">총 ${totalCount}건</span>`;

            const pageBtnStyle = (active) => `
                min-width:30px; height:30px; padding:0 6px; border-radius:6px; border:1px solid ${active ? '#3b82f6' : '#e2e8f0'};
                background:${active ? '#3b82f6' : '#fff'}; color:${active ? '#fff' : '#475569'};
                font-weight:${active ? 'bold' : 'normal'}; cursor:pointer; font-size:13px;
            `;

            buttonsHtml += `<button onclick="loadExcelModalPage(${Math.max(1, currentPage - 1)})"
                style="${pageBtnStyle(false)}" ${currentPage === 1 ? 'disabled' : ''}>
                <i class="fa-solid fa-chevron-left"></i></button>`;

            const windowSize = 3;
            let start = Math.max(1, currentPage - windowSize);
            let end = Math.min(totalPages, currentPage + windowSize);

            if (start > 1) {
                buttonsHtml += `<button onclick="loadExcelModalPage(1)" style="${pageBtnStyle(false)}">1</button>`;
                if (start > 2) buttonsHtml += `<span style="color:#cbd5e1;">...</span>`;
            }

            for (let p = start; p <= end; p++) {
                buttonsHtml += `<button onclick="loadExcelModalPage(${p})" style="${pageBtnStyle(p === currentPage)}">${p}</button>`;
            }

            if (end < totalPages) {
                if (end < totalPages - 1) buttonsHtml += `<span style="color:#cbd5e1;">...</span>`;
                buttonsHtml += `<button onclick="loadExcelModalPage(${totalPages})" style="${pageBtnStyle(false)}">${totalPages}</button>`;
            }

            buttonsHtml += `<button onclick="loadExcelModalPage(${Math.min(totalPages, currentPage + 1)})"
                style="${pageBtnStyle(false)}" ${currentPage === totalPages ? 'disabled' : ''}>
                <i class="fa-solid fa-chevron-right"></i></button>`;

            pagerEl.innerHTML = buttonsHtml;
        }
        
        function setFilterOptions(records) {
            if (!records || records.length === 0) return;
            let inspectors = [...new Set(records.map(r => r.inspector))].filter(Boolean).sort();
            
            const insSelect = document.getElementById('filterInspector');
            const prevIns = insSelect.value;

            insSelect.innerHTML = '<option value="all">전체 작업자</option>';
            inspectors.forEach(ins => insSelect.innerHTML += `<option value="${ins}">${ins}</option>`);
            
            if([...insSelect.options].some(o => o.value === prevIns)) insSelect.value = prevIns;
        }

        function applyFilters() {
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            const selectedInspector = document.getElementById('filterInspector').value;
            const selectedFacility = document.getElementById('facilitySelect').value; 

            let filtered = allRecords.filter(r => {
                const rDate = r.date.replace(/[^0-9]/g, '-').substring(0, 10);
                const dateMatch = (!start || rDate >= start) && (!end || rDate <= end);
                const inspectorMatch = (selectedInspector === "all" || r.inspector === selectedInspector);
                
                let facilityMatch = false;
                if (selectedFacility === "전체") {
                    facilityMatch = true; 
                } else {
                    facilityMatch = r.fid.includes(selectedFacility); 
                }
                
                return dateMatch && inspectorMatch && facilityMatch;
            });

            buildDashboard(filtered);
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert(`전체화면 지원 안 함: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }
        
        document.addEventListener("fullscreenchange", () => {
            if (!document.fullscreenElement) {
                location.reload();
            }
        });
        
        function buildDashboard(records) {
            Object.keys(chartInstances).forEach(key => {
                if(chartInstances[key]) {
                    chartInstances[key].destroy();
                    chartInstances[key] = null;
                }
            });

            const palette = ['#3b82f6', '#f97316', '#a855f7', '#84cc16', '#06b6d4', '#eab308', '#ec4899', '#10b981', '#6366f1', '#f43f5e'];

            let dates = [...new Set(records.map(r => r.date))].filter(Boolean).sort();
            let fids = [...new Set(records.map(r => r.fid))].filter(Boolean).sort();
            let inspectors = [...new Set(records.map(r => r.inspector))].filter(Boolean).sort();
            
            const dateCount = dates.length;

            const firstCardTitle = document.querySelector('.chart-card h3');
            if (firstCardTitle && dates.length > 0) {
                let monthsInQuery = [...new Set(dates.map(d => {
                    const m = d.match(/-(\d{2})-/);
                    return m ? m[1] : null;
                }))].filter(Boolean).sort();

                let monthText = "";
                if (monthsInQuery.length > 1) {
                    monthText = `${monthsInQuery[0]}월~${monthsInQuery[monthsInQuery.length - 1]}월`;
                } else {
                    monthText = `${monthsInQuery[0]}월`;
                }

                firstCardTitle.innerHTML = `<i class="fas fa-chart-column"></i> [${monthText}] ${userCenter} 설비 일별 점검 횟수`;
            } else if (firstCardTitle) {
                firstCardTitle.innerHTML = `<i class="fas fa-chart-column"></i> [전체 누적] ${userCenter} 설비 일별 점검 횟수`;
            }

            // 1번 뷰
            const stackedCanvas = document.getElementById('stackedBarChart');
            if (dateCount > 7) {
                stackedCanvas.style.width = (dateCount * 75) + "px";
            } else {
                stackedCanvas.style.width = "100%";
            }

            let customDateLabels = dates.map(dateStr => {
                if(!dateStr) return "";
                const match = dateStr.match(/-(\d{2})$/); 
                if(match) return parseInt(match[1], 10) + "일"; 
                return dateStr;
            });

            let dateCounts = dates.map(date => records.filter(r => r.date === date).length);
            let dateColors = dates.map((_, idx) => palette[idx % palette.length]);

            chartInstances.stackedBarChart = new Chart(stackedCanvas, {
                type: 'bar',
                data: { 
                    labels: customDateLabels, 
                    datasets: [{
                        label: '일일 총 점검 횟수',
                        data: dateCounts,
                        backgroundColor: dateColors,
                        borderRadius: 4
                    }] 
                },
                options: { 
                    responsive: true, maintainAspectRatio: false,
                    scales: { 
                        y: { beginAtZero: true, ticks: { stepSize: 1, color: '#64748b' }, grid: { color: '#f1f5f9' }, grace: '15%' },
                        x: { ticks: { color: '#64748b', maxRotation: 0, minRotation: 0 }, grid: { display: false } }
                    },
                    plugins: { 
                        legend: { display: false },
                        datalabels: {
                            anchor: 'end', align: 'top', color: '#475569',
                            font: { weight: 'bold', size: 11 },
                            formatter: (val) => val > 0 ? val + '건' : ''
                        }
                    }
                }
            });

            // 2번 뷰
            const horizontalCanvas = document.getElementById('horizontalBarChart');
            const categories = {
                "🚨 소방설비": 0, "⚡ 전기설비": 0, "👮‍♂️ 순찰기록": 0, "⚙️ 기계/공조": 0, "🛠️ 기타설비": 0
            };

            records.forEach(r => {
                const fid = r.fid || "";
                if (fid.includes('소방')) categories["🚨 소방설비"]++;
                else if (fid.includes('전기')) categories["⚡ 전기설비"]++;
                else if (fid.includes('순찰')) categories["👮‍♂️ 순찰기록"]++;
                else if (fid.includes('기계') || fid.includes('공조')) categories["⚙️ 기계/공조"]++;
                else categories["🛠️ 기타설비"]++;
            });

            const categoryLabels = Object.keys(categories);
            const categoryData = Object.values(categories);
            let categoryColors = categoryLabels.map((_, idx) => palette[idx % palette.length]);

            chartInstances.horizontalBarChart = new Chart(horizontalCanvas, {
                type: 'bar',
                data: {
                    labels: categoryLabels, 
                    datasets: [{
                        data: categoryData,   
                        backgroundColor: categoryColors,
                        barThickness: 22,
                        borderRadius: 4
                    }] 
                },
                options: { 
                    indexAxis: 'y', responsive: true, maintainAspectRatio: false, 
                    scales: { 
                        x: { beginAtZero: true, ticks: { stepSize: 1, color: '#64748b' }, grid: { color: '#f1f5f9' }, grace: '15%' },
                        y: { ticks: { color: '#1e293b', font: { weight: 'bold', size: 12 } }, grid: { display: false } }
                    },
                    plugins: { 
                        legend: { display: false }, 
                        datalabels: {
                            anchor: 'end', align: 'right', color: '#475569',
                            font: { weight: 'bold', size: 11 },
                            formatter: (val) => val > 0 ? val + '건' : ''
                        }
                    }
                }
            });

            // 3번 뷰
            const pivotBody = document.getElementById('pivot-body');
            let tableHtml = "";
            // [구조 변경] fidLocations는 하드코딩을 제거하고 서버(/api/dashboard) 응답에서
            // 받은 전역 변수를 그대로 사용합니다. (로직 위치: server.js의 FID_LOCATIONS)
                // fids.forEach 루프 내부를 이렇게 바꾸세요
                fids.forEach(fid => {
                    let totalCount = records.filter(r => r.fid === fid).length;

                    // excelMap[fid]는 설비당 가장 최신(정렬 기준 첫 번째) 엑셀 파일 1건의 링크입니다.
                    // 아이콘 클릭 시 그 파일이 바로 새 탭에서 다운로드됩니다. (기존 동작 그대로)
                    let finalUrl = (typeof excelMap !== 'undefined' && excelMap[fid]) ? excelMap[fid] : "";

                    let excelIcon = (finalUrl !== "") ?
                        `<a href="${finalUrl}" target="_blank" style="color:#217346; font-size:18px;" title="최신 엑셀 보고서 바로 다운로드">
                            <i class="fa-solid fa-file-excel"></i>
                        </a>` :
                        `<span style="color:#cbd5e1;">-</span>`;

                    const locationText = fidLocations[fid] ? ` (${fidLocations[fid]})` : "";

                    tableHtml += `<tr>
                        <td style="font-weight:bold; color:#1e293b; text-align:left; padding-left:20px;">
                            ${fid}<span style="color:#64748b; font-weight:normal;">${locationText}</span>
                        </td>
                        <td style="font-weight:bold; color:#3b82f6; text-align:center;">${totalCount} 건</td>
                        <td style="text-align:center;">${excelIcon}</td>
                    </tr>`;
                });
                pivotBody.innerHTML = tableHtml || `<tr><td colspan="3" style="color:#94a3b8; padding:40px; text-align:center;">데이터가 없습니다.</td></tr>`;


            // 4번 뷰
            let inspectorDataList = inspectors.map((ins, idx) => {
                return { name: ins, count: records.filter(r => r.inspector === ins).length, color: palette[idx % palette.length] };
            });
            inspectorDataList.sort((a, b) => b.count - a.count);

            let sortedLabels = inspectorDataList.map(item => item.name);
            let sortedCounts = inspectorDataList.map(item => item.count);
            let sortedColors = inspectorDataList.map(item => item.color);
            let total = sortedCounts.reduce((a, b) => a + b, 0); 

            const inspectorPivotBody = document.getElementById('inspector-pivot-body');
            let inspectorTableHtml = "";
            inspectorDataList.forEach(item => {
                inspectorTableHtml += `<tr>
                    <td style="font-weight: bold; color: #334155;">
                        <span style="display:inline-block; width:10px; height:10px; background-color:${item.color}; border-radius:50%; margin-right:6px;"></span>${item.name}
                    </td>
                    <td style="font-weight: bold; color: #475569;">${item.count} 건</td>
                </tr>`;
            });
            inspectorPivotBody.innerHTML = inspectorTableHtml || `<tr><td colspan="2" style="color:#94a3b8; padding:20px;">기록 없음</td></tr>`;

            const pieCanvas = document.getElementById('pieChart');
            chartInstances.pieChart = new Chart(pieCanvas, {
                type: 'pie',
                data: {
                    labels: sortedLabels,
                    datasets: [{ data: sortedCounts, backgroundColor: sortedColors }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: {
                        datalabels: {
                            color: '#ffffff', font: { weight: 'bold', size: 11 },
                            formatter: function(value, context) {
                                if (total === 0) return '';
                                let percentage = ((value / total) * 100).toFixed(1);
                                if (percentage < 6) return ''; 
                                return context.chart.data.labels[context.dataIndex] + '\n' + percentage + '%';
                            },
                            align: 'center', anchor: 'center', textAlign: 'center'
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let value = context.raw;
                                    let percentage = total > 0 ? ((value / total) * 100).toFixed(1) : 0; 
                                    return ` ${context.label}: ${value}건 (${percentage}%)`;
                                }
                            }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
